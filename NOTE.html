<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Finance Tracker - Fahad Hossain</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-color: #6c5ce7;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .dev-name { color: #00d2ff; }

        .contact-btn {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            min-width: 160px;
            border-radius: 10px;
            z-index: 1;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover { background: var(--primary-color); border-radius: 10px; }

        .contact-btn:hover .dropdown-content { display: block; }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary-color); }

        /* Layout Grid */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Note Section */
        .note-section { padding: 30px; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Calculator */
        .calculator {
            padding: 20px;
            height: fit-content;
        }

        .calc-display {
            width: 100%;
            height: 50px;
            text-align: right;
            margin-bottom: 15px;
            font-size: 1.5rem;
            padding: 10px;
        }

        .calc-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-keys button {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .calc-keys button:hover { background: var(--primary-color); }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="glass-card">
        <h1>THIS WEBSITE IS DEVELOPED BY - <span class="dev-name">MD FAHAD HOSSAIN</span></h1>
        <div class="contact-btn">
            <button class="btn">CONTRACT WITH DEVELOPER <i class="fas fa-chevron-down"></i></button>
            <div class="dropdown-content">
                <a href="https://www.facebook.com/share/18SsJYx9y2/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="https://www.instagram.com/mdfahadhossain006?igsh=ZzhhbzljaXVxcmFw" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="note-section glass-card">
            <h3>COUNT IN BOOK </h3>
            <div class="input-group">
                <input type="date" id="dateInput">
                <input type="text" id="titleInput" placeholder="DETAILS like (GROCERY)">
                <input type="number" id="amountInput" placeholder="AMOUNT OF MONEY">
                <button class="btn" onclick="addRecord()">ADD</button>
            </div>

            <div id="pdfContent">
                <table id="recordTable">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>DETAILS</th>
                            <th>AMOUNT</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
            
            <button class="btn" style="margin-top: 20px; background: #27ae60;" onclick="downloadPDF()">
                <i class="fas fa-file-pdf"></i> DOWNLOAD IN PDF
            </button>
        </div>

        <div class="calculator glass-card">
            <h3>CALCULATOR</h3>
            <input type="text" id="display" class="calc-display" disabled>
            <div class="calc-keys">
                <button onclick="clearDisplay()">C</button>
                <button onclick="appendToDisplay('/')">/</button>
                <button onclick="appendToDisplay('*')">*</button>
                <button onclick="deleteLast()">DEL</button>
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('-')">-</button>
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('+')">+</button>
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="calculate()">=</button>
                <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
                <button onclick="appendToDisplay('.')">.</button>
            </div>
        </div>
    </div>

    <script>
        // Load Data from LocalStorage
        document.addEventListener('DOMContentLoaded', () => {
            loadRecords();
            document.getElementById('dateInput').valueAsDate = new Date();
        });

        function addRecord() {
            const date = document.getElementById('dateInput').value;
            const title = document.getElementById('titleInput').value;
            const amount = document.getElementById('amountInput').value;

            if (!date || !title || !amount) {
                alert("FILL ALL GAP");
                return;
            }

            const record = { date, title, amount };
            let records = JSON.parse(localStorage.getItem('myRecords')) || [];
            records.push(record);
            localStorage.setItem('myRecords', JSON.stringify(records));

            document.getElementById('titleInput').value = '';
            document.getElementById('amountInput').value = '';
            loadRecords();
        }

        function loadRecords() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            let records = JSON.parse(localStorage.getItem('myRecords')) || [];

            records.forEach((data, index) => {
                const row = `<tr>
                    <td>${data.date}</td>
                    <td>${data.title}</td>
                    <td>${data.amount} ৳</td>
                    <td><button onclick="deleteRecord(${index})" style="background:none; border:none; color:#ff7675; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        function deleteRecord(index) {
            let records = JSON.parse(localStorage.getItem('myRecords'));
            records.splice(index, 1);
            localStorage.setItem('myRecords', JSON.stringify(records));
            loadRecords();
        }

        // PDF Download
        function downloadPDF() {
            const element = document.getElementById('pdfContent');
            const opt = {
                margin: 1,
                filename: 'LIST.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#24243e' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Calculator Logic
        const display = document.getElementById('display');
        function appendToDisplay(input) { display.value += input; }
        function clearDisplay() { display.value = ''; }
        function deleteLast() { display.value = display.value.slice(0, -1); }
        function calculate() {
            try { display.value = eval(display.value); }
            catch (error) { display.value = "Error"; }
        }
    </script>
</body>
</html>
